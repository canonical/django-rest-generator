name: Test & Lint

permissions:
  contents: read

on:
  push:
    branches: 
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
    - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
      with:
        persist-credentials: false
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e '.[tests]'
    - name: Lint with flake8
      run: |
        make lint
    - name: Run the test suite
      run: |
        make test
    - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
      with:
        name: coverage-${{ matrix.python-version }}
        path: .coverage.xml
        include-hidden-files: true

  report-coverage:
      runs-on: ubuntu-latest
      strategy:
        matrix:
          python-version: ["3.10", "3.11", "3.12"]
      needs: [build]
      if: github.event_name == 'pull_request'
      permissions:
        pull-requests: write
        contents: read
      steps:
        - name: Download tests coverage report
          uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e
          with:
            name: coverage-${{ matrix.python-version }}
        - name: Report Coverage and annotate PR (if exists) 
          uses: orgoro/coverage@3f13a558c5af7376496aa4848bf0224aead366ac
          with:
              coverageFile: .coverage.xml
              token: ${{ secrets.GITHUB_TOKEN }}
              thresholdAll: 0.50
              thresholdNew: 0.90
              thresholdModified: 0.0 

  license:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
      with:
        persist-credentials: false
    - name: License Eye Header Check
      uses: apache/skywalking-eyes/header@5c5b974209f0de5d905f37deb69369068ebfc15c
